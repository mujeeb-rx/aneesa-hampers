<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Aneesa Hampers — Loading</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ─────────────────────────────────────────────
   RESET & ROOT
───────────────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;}

:root{
  --cl-bg1:#140308;
  --cl-bg2:#3b0d1a;
  --cl-bg3:#5a1528;
  --cl-bg4:#1e0610;
  --cl-rose:rgba(192,100,122,.38);
  --cl-rose2:rgba(232,160,176,.22);
  --cl-gold:rgba(201,169,110,.18);
  --cl-accent:#c0647a;
  --cl-accent2:#c9a96e;
  --cl-spark:rgba(201,169,110,.85);
  --cl-progress-a:rgba(192,100,122,.65);
  --cl-progress-b:rgba(201,169,110,.85);
  --cl-progress-c:rgba(232,160,176,.65);
}

/* ─────────────────────────────────────────────
   FULL-SCREEN LOADER STAGE
───────────────────────────────────────────── */
#cin-loader{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:linear-gradient(145deg,var(--cl-bg1) 0%,var(--cl-bg2) 40%,var(--cl-bg3) 70%,var(--cl-bg4) 100%);
  overflow:hidden;
  z-index:99999;
  opacity:1;visibility:visible;
  transition:opacity 1.1s cubic-bezier(.4,0,.2,1),visibility 1.1s;
  will-change:opacity;
}
#cin-loader.cin-done{
  opacity:0;visibility:hidden;pointer-events:none;
}

/* ─── Ambient background glow pool ─── */
.cin-bg-glow{
  position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 58% 48% at 50% 48%, rgba(201,169,110,.06) 0%, transparent 72%),
    radial-gradient(ellipse 80% 60% at 50% 52%, rgba(192,100,122,.055) 0%, transparent 80%);
  animation:cinBgPulse 4.5s ease-in-out infinite alternate;
}
@keyframes cinBgPulse{from{opacity:.65;}to{opacity:1;}}

/* ─── Soft ambient blobs ─── */
.cin-blob{position:absolute;border-radius:50%;filter:blur(90px);pointer-events:none;will-change:transform;}

.cin-blob-1{
  width:520px;height:520px;
  background:radial-gradient(circle,var(--cl-rose) 0%,transparent 70%);
  top:-150px;left:-120px;
  animation:cinBlob1 7s ease-in-out infinite alternate;
}
.cin-blob-2{
  width:420px;height:420px;
  background:radial-gradient(circle,var(--cl-rose2) 0%,transparent 70%);
  bottom:-120px;right:-90px;
  animation:cinBlob2 8s ease-in-out infinite alternate;
}
.cin-blob-3{
  width:320px;height:320px;
  background:radial-gradient(circle,var(--cl-gold) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:cinBlob3 5.5s ease-in-out infinite alternate;
}
@keyframes cinBlob1{from{transform:translate(0,0) scale(1);}to{transform:translate(45px,35px) scale(1.18);}}
@keyframes cinBlob2{from{transform:translate(0,0) scale(1);}to{transform:translate(-35px,25px) scale(1.14);}}
@keyframes cinBlob3{from{transform:translate(-50%,-50%) scale(1);}to{transform:translate(-50%,-50%) scale(1.22);}}

/* ─── Diagonal shimmer sweep ─── */
.cin-shimmer-line{
  position:absolute;top:0;left:-120%;
  width:50%;height:100%;
  background:linear-gradient(108deg,transparent 35%,rgba(255,255,255,.016) 50%,transparent 65%);
  animation:cinShimmer 4.2s .4s ease-in-out infinite;
  pointer-events:none;
}
@keyframes cinShimmer{0%{left:-120%;}100%{left:220%;}}

/* ─── Floating gold particles ─── */
.cin-particles{position:absolute;inset:0;pointer-events:none;}
.cin-spark{
  position:absolute;
  border-radius:50%;
  background:var(--cl-spark);
  box-shadow:0 0 6px rgba(201,169,110,.9),0 0 14px rgba(249,228,233,.55);
  animation:cinSpark var(--dur,3s) var(--delay,0s) ease-in-out infinite;
  opacity:0;
}
@keyframes cinSpark{
  0%  {opacity:0;transform:translateY(0) scale(0) rotate(0deg);}
  22% {opacity:1;transform:translateY(-20px) scale(1.3) rotate(90deg);}
  78% {opacity:.45;transform:translateY(-58px) scale(.85) rotate(200deg);}
  100%{opacity:0;transform:translateY(-88px) scale(0) rotate(290deg);}
}

/* ─────────────────────────────────────────────
   MAIN COMPOSITION: centered vertical stack
───────────────────────────────────────────── */
.cin-stage{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0;
  position:relative;z-index:2;
  padding:0 28px;
  width:100%;max-width:560px;
  text-align:center;
}

/* ─────────────────────────────────────────────
   PHASE 1: Gift box circle  — blooms from blur
───────────────────────────────────────────── */
.cin-gift-wrap{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:36px;
  animation:cinGiftBloom .9s cubic-bezier(.22,1,.36,1) both;
  will-change:transform,opacity,filter;
}
@keyframes cinGiftBloom{
  0%  {opacity:0;transform:scale(.72);filter:blur(22px);}
  55% {opacity:1;filter:blur(3px);transform:scale(1.05);}
  100%{opacity:1;transform:scale(1);filter:blur(0);}
}

/* Outer pulsing halo */
.cin-gift-halo{
  position:absolute;
  width:240px;height:240px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(201,169,110,.2) 0%,rgba(192,100,122,.09) 46%,transparent 70%);
  filter:blur(28px);
  animation:cinHaloPulse 3.2s .9s ease-in-out infinite alternate;
  pointer-events:none;
}
@keyframes cinHaloPulse{
  from{transform:scale(1);opacity:.65;}
  to{transform:scale(1.18);opacity:1;}
}

/* Outer soft ring 1 */
.cin-ring-1{
  position:absolute;inset:-22px;
  border-radius:50%;
  border:1px solid rgba(192,100,122,.22);
  animation:cinRingIn 1.9s 2.1s cubic-bezier(.22,1,.36,1) both;
}
/* Outer soft ring 2 */
.cin-ring-2{
  position:absolute;inset:-40px;
  border-radius:50%;
  border:1px solid rgba(201,169,110,.12);
  animation:cinRingIn 1.9s 2.7s cubic-bezier(.22,1,.36,1) both;
}
/* Outer soft ring 3 (very faint, large) */
.cin-ring-3{
  position:absolute;inset:-64px;
  border-radius:50%;
  border:1px solid rgba(192,100,122,.06);
  animation:cinRingIn 2s 3.2s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cinRingIn{from{transform:scale(.65);opacity:0;}to{transform:scale(1);opacity:1;}}

/* The circle */
.cin-gift-circle{
  width:180px;height:180px;
  border-radius:50%;
  background:radial-gradient(ellipse at 38% 32%,rgba(249,228,233,.12) 0%,rgba(192,100,122,.06) 65%,transparent 100%),rgba(255,255,255,.04);
  border:1px solid rgba(201,169,110,.22);
  box-shadow:
    0 0 0 20px rgba(201,169,110,.04),
    0 0 70px rgba(192,100,122,.35),
    0 0 130px rgba(192,100,122,.16),
    inset 0 1px 0 rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  animation:cinCircleGlow 3.4s .9s ease-in-out infinite alternate;
  overflow:visible;
  position:relative;
}
@keyframes cinCircleGlow{
  from{
    box-shadow:
      0 0 0 20px rgba(201,169,110,.04),
      0 0 70px rgba(192,100,122,.35),
      0 0 130px rgba(192,100,122,.16),
      inset 0 1px 0 rgba(255,255,255,.07);
  }
  to{
    box-shadow:
      0 0 0 24px rgba(201,169,110,.06),
      0 0 100px rgba(192,100,122,.55),
      0 0 180px rgba(192,100,122,.26),
      0 0 240px rgba(192,100,122,.12),
      inset 0 1px 0 rgba(255,255,255,.1);
  }
}

/* Float loop after bloom */
.cin-gift-wrap.cin-float{
  animation:
    cinGiftBloom .9s cubic-bezier(.22,1,.36,1) both,
    cinFloat 5.5s 1.1s ease-in-out infinite;
}
@keyframes cinFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-9px);}
}

/* SVG inside circle */
.cin-gift-circle svg{
  width:116px;height:116px;
  filter:drop-shadow(0 0 20px rgba(201,169,110,.5)) drop-shadow(0 5px 14px rgba(0,0,0,.55));
  overflow:visible;
}

/* Per-butterfly float animations */
.cin-gift-circle svg g:nth-of-type(1){animation:cinBf1 4.1s 1.55s ease-in-out infinite;}
.cin-gift-circle svg g:nth-of-type(2){animation:cinBf2 4.7s 2.05s ease-in-out infinite;}
.cin-gift-circle svg g:nth-of-type(3){animation:cinBf3 5.2s 1.85s ease-in-out infinite;}
.cin-gift-circle svg g:nth-of-type(4){animation:cinBf4 4.4s 2.35s ease-in-out infinite;}
@keyframes cinBf1{0%,100%{transform:translate(55px,32px) rotate(-20deg) translateY(0);}50%{transform:translate(55px,32px) rotate(-26deg) translateY(-9px);}}
@keyframes cinBf2{0%,100%{transform:translate(112px,22px) rotate(15deg) translateY(0);}50%{transform:translate(112px,22px) rotate(21deg) translateY(-11px);}}
@keyframes cinBf3{0%,100%{transform:translate(128px,52px) rotate(25deg) translateY(0);}50%{transform:translate(128px,52px) rotate(31deg) translateY(-7px);}}
@keyframes cinBf4{0%,100%{transform:translate(138px,35px) rotate(5deg) translateY(0);}50%{transform:translate(138px,35px) rotate(11deg) translateY(-13px);}}

/* ─────────────────────────────────────────────
   PHASE 2: Brand name  — staggered reveal
───────────────────────────────────────────── */
.cin-brand-block{
  display:flex;flex-direction:column;
  align-items:center;
  gap:0;
}

.cin-eyebrow{
  font-family:'Jost',sans-serif;
  font-size:.52rem;letter-spacing:5.5px;
  text-transform:uppercase;
  color:var(--cl-accent2);
  opacity:0;margin-bottom:13px;
  animation:cinFadeUp 1s 2.8s cubic-bezier(.4,0,.2,1) forwards;
}

.cin-word-aneesa{
  display:block;
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2.8rem,6vw,4.2rem);
  font-style:italic;font-weight:400;
  color:rgba(255,255,255,.96);
  letter-spacing:3px;
  line-height:1;
  text-shadow:0 4px 36px rgba(0,0,0,.6),0 0 70px rgba(192,100,122,.18);
  opacity:0;
  animation:cinWordReveal 1.5s 3.7s cubic-bezier(.22,1,.36,1) forwards;
}
.cin-word-hampers{
  display:block;
  font-family:'Jost',sans-serif;
  font-size:clamp(.82rem,1.7vw,1.05rem);
  font-weight:300;letter-spacing:10px;
  text-transform:uppercase;
  color:rgba(255,255,255,.62);
  margin-top:4px;
  opacity:0;
  animation:cinWordReveal 1.15s 5.1s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes cinWordReveal{
  0%  {opacity:0;transform:translateX(-24px);filter:blur(10px);}
  38% {opacity:.7;filter:blur(3px);}
  100%{opacity:1;transform:translateX(0);filter:blur(0);}
}

/* Horizontal gold ornament */
.cin-h-divider{
  width:0;height:1px;
  background:linear-gradient(90deg,
    transparent 0%,rgba(201,169,110,.85) 15%,
    rgba(201,169,110,1) 50%,
    rgba(192,100,122,.5) 80%,transparent 100%);
  margin:18px auto 16px;
  animation:cinHDiv 1s 5.8s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes cinHDiv{to{width:230px;}}

.cin-tagline{
  display:block;
  font-family:'Jost',sans-serif;
  font-size:.7rem;font-weight:300;letter-spacing:1.6px;
  color:rgba(255,255,255,.44);
  opacity:0;
  animation:cinFadeUp 1.1s 6.2s cubic-bezier(.4,0,.2,1) forwards;
}
.cin-location{
  display:block;
  font-family:'Jost',sans-serif;
  font-size:.5rem;letter-spacing:3.8px;
  text-transform:uppercase;
  color:rgba(255,255,255,.27);
  margin-top:11px;
  opacity:0;
  animation:cinFadeUp 1s 7.0s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes cinFadeUp{
  from{opacity:0;transform:translateY(18px);}
  60%{opacity:.75;}
  to{opacity:1;transform:translateY(0);}
}

/* ─────────────────────────────────────────────
   PROGRESS BAR
───────────────────────────────────────────── */
.cin-progress{
  position:absolute;bottom:0;left:0;right:0;
  height:2px;
  background:rgba(255,255,255,.05);
  overflow:hidden;
}
.cin-progress-bar{
  height:100%;width:0;
  background:linear-gradient(90deg,
    var(--cl-progress-a),
    var(--cl-progress-b),
    var(--cl-progress-c));
  border-radius:2px;
  animation:cinProgress 8.2s cubic-bezier(.14,0,.38,1) forwards;
}
@keyframes cinProgress{
  0%  {width:0;}
  28% {width:20%;}
  58% {width:58%;}
  83% {width:85%;}
  100%{width:100%;}
}

/* ─── Mobile ─── */
@media(max-width:600px){
  .cin-gift-circle{width:150px;height:150px;}
  .cin-gift-circle svg{width:96px;height:96px;}
  .cin-gift-halo{width:200px;height:200px;}
  .cin-word-aneesa{font-size:2.5rem;}
  .cin-word-hampers{font-size:.8rem;letter-spacing:8px;}
  .cin-h-divider{margin:14px auto 13px;}
  @keyframes cinHDiv{to{width:180px;}}
  .cin-progress-bar{animation-duration:5.5s;}
}
</style>
</head>
<body>

<!-- ═══════ CINEMATIC SPLASH SCREEN ═══════ -->
<div id="cin-loader" role="status" aria-label="Loading Aneesa Hampers">

  <!-- Ambient background glow -->
  <div class="cin-bg-glow" aria-hidden="true"></div>

  <!-- Floating glow blobs -->
  <div class="cin-blob cin-blob-1" aria-hidden="true"></div>
  <div class="cin-blob cin-blob-2" aria-hidden="true"></div>
  <div class="cin-blob cin-blob-3" aria-hidden="true"></div>

  <!-- Diagonal shimmer -->
  <div class="cin-shimmer-line" aria-hidden="true"></div>

  <!-- Floating gold particles (JS-spawned) -->
  <div class="cin-particles" id="cinParticles" aria-hidden="true"></div>

  <!-- ═══ MAIN STAGE ═══ -->
  <div class="cin-stage">

    <!-- Gift box circle -->
    <div class="cin-gift-wrap cin-float" id="cinGiftWrap">
      <div class="cin-gift-halo" aria-hidden="true"></div>
      <div class="cin-ring-1" aria-hidden="true"></div>
      <div class="cin-ring-2" aria-hidden="true"></div>
      <div class="cin-ring-3" aria-hidden="true"></div>

      <div class="cin-gift-circle">
        <!-- Gift box SVG + butterflies + sparkle dots -->
        <svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

          <!-- ── Gift box body ── -->
          <rect x="42" y="88" width="76" height="52" rx="4"
            fill="rgba(249,228,233,.14)" stroke="rgba(232,160,176,.72)" stroke-width="1.8"/>

          <!-- ── Box lid ── -->
          <rect x="36" y="72" width="88" height="20" rx="4"
            fill="rgba(249,228,233,.09)" stroke="rgba(232,160,176,.72)" stroke-width="1.8"/>

          <!-- ── Ribbon vertical ── -->
          <rect x="76" y="72" width="8" height="68" rx="3"
            fill="rgba(192,100,122,.62)"/>

          <!-- ── Ribbon horizontal ── -->
          <rect x="36" y="78" width="88" height="8" rx="3"
            fill="rgba(192,100,122,.62)"/>

          <!-- ── Bow left loop ── -->
          <path d="M80 72 C68 55, 50 50, 52 62 C54 72, 70 72, 80 72Z"
            fill="rgba(192,100,122,.52)" stroke="rgba(232,160,176,.58)" stroke-width="1"/>

          <!-- ── Bow right loop ── -->
          <path d="M80 72 C92 55, 110 50, 108 62 C106 72, 90 72, 80 72Z"
            fill="rgba(192,100,122,.52)" stroke="rgba(232,160,176,.58)" stroke-width="1"/>

          <!-- ── Bow centre knot ── -->
          <circle cx="80" cy="72" r="5.5" fill="rgba(201,169,110,.9)"/>

          <!-- ── Butterfly 1 (top-left) ── -->
          <g transform="translate(55,32) rotate(-20)">
            <path d="M0,0 C-10,-14 -22,-10 -16,0 C-10,8 -4,6 0,0Z" fill="rgba(232,160,176,.78)"/>
            <path d="M0,0 C10,-14 22,-10 16,0 C10,8 4,6 0,0Z"  fill="rgba(232,160,176,.78)"/>
            <path d="M0,0 C-6,8 -12,14 -8,18 C-4,22 -1,14 0,0Z"  fill="rgba(249,200,210,.62)"/>
            <path d="M0,0 C6,8 12,14 8,18 C4,22 1,14 0,0Z"   fill="rgba(249,200,210,.62)"/>
            <line x1="0" y1="0" x2="0" y2="18" stroke="rgba(59,13,26,.45)" stroke-width="1"/>
          </g>

          <!-- ── Butterfly 2 (top-right) ── -->
          <g transform="translate(112,22) rotate(15)">
            <path d="M0,0 C-8,-12 -18,-8 -13,0 C-8,7 -3,5 0,0Z" fill="rgba(249,200,210,.82)"/>
            <path d="M0,0 C8,-12 18,-8 13,0 C8,7 3,5 0,0Z"   fill="rgba(249,200,210,.82)"/>
            <path d="M0,0 C-5,6 -9,12 -6,15 C-3,18 -1,12 0,0Z"  fill="rgba(232,160,176,.58)"/>
            <path d="M0,0 C5,6 9,12 6,15 C3,18 1,12 0,0Z"   fill="rgba(232,160,176,.58)"/>
            <line x1="0" y1="0" x2="0" y2="14" stroke="rgba(59,13,26,.45)" stroke-width="1"/>
          </g>

          <!-- ── Butterfly 3 (mid-right) ── -->
          <g transform="translate(128,52) rotate(25)">
            <path d="M0,0 C-7,-10 -15,-7 -11,0 C-7,6 -2,4 0,0Z" fill="rgba(232,160,176,.67)"/>
            <path d="M0,0 C7,-10 15,-7 11,0 C7,6 2,4 0,0Z"   fill="rgba(232,160,176,.67)"/>
            <path d="M0,0 C-4,5 -8,10 -5,12 C-2,15 -1,10 0,0Z"  fill="rgba(249,228,233,.52)"/>
            <path d="M0,0 C4,5 8,10 5,12 C2,15 1,10 0,0Z"   fill="rgba(249,228,233,.52)"/>
            <line x1="0" y1="0" x2="0" y2="12" stroke="rgba(59,13,26,.4)" stroke-width="1"/>
          </g>

          <!-- ── Butterfly 4 (small, far-right) ── -->
          <g transform="translate(138,35) rotate(5)">
            <path d="M0,0 C-5,-8 -12,-5 -9,0 C-5,5 -2,3 0,0Z"  fill="rgba(249,200,210,.72)"/>
            <path d="M0,0 C5,-8 12,-5 9,0 C5,5 2,3 0,0Z"   fill="rgba(249,200,210,.72)"/>
            <line x1="0" y1="0" x2="0" y2="9" stroke="rgba(59,13,26,.4)" stroke-width="1"/>
          </g>

          <!-- ── Pulsing sparkle dots ── -->
          <circle cx="95" cy="42" r="2" fill="rgba(201,169,110,.92)">
            <animate attributeName="opacity" values="0.35;1;0.35" dur="2s" repeatCount="indefinite"/>
          </circle>
          <circle cx="72" cy="48" r="1.5" fill="rgba(249,228,233,.95)">
            <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
          </circle>
          <circle cx="125" cy="65" r="1.5" fill="rgba(232,160,176,.9)">
            <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" begin="0.6s" repeatCount="indefinite"/>
          </circle>
          <circle cx="48" cy="55" r="1.8" fill="rgba(201,169,110,.88)">
            <animate attributeName="opacity" values="0.3;1;0.3" dur="1.9s" begin="0.45s" repeatCount="indefinite"/>
          </circle>
          <circle cx="135" cy="48" r="1.3" fill="rgba(249,228,233,.92)">
            <animate attributeName="opacity" values="0.4;1;0.4" dur="2.1s" begin="0.2s" repeatCount="indefinite"/>
          </circle>
          <circle cx="105" cy="28" r="1.6" fill="rgba(232,160,176,.88)">
            <animate attributeName="opacity" values="0.35;1;0.35" dur="2.3s" begin="0.55s" repeatCount="indefinite"/>
          </circle>
          <circle cx="65" cy="38" r="1.4" fill="rgba(201,169,110,.92)">
            <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.7s" repeatCount="indefinite"/>
          </circle>
          <circle cx="118" cy="38" r="1.2" fill="rgba(249,228,233,.94)">
            <animate attributeName="opacity" values="0.4;1;0.4" dur="1.85s" begin="0.35s" repeatCount="indefinite"/>
          </circle>

        </svg>
      </div>
    </div><!-- /.cin-gift-wrap -->

    <!-- Brand text block -->
    <div class="cin-brand-block">
      <span class="cin-eyebrow">✦ &nbsp;Premium Gifting&nbsp; ✦</span>

      <span class="cin-word-aneesa">Aneesa</span>
      <span class="cin-word-hampers">Hampers</span>

      <div class="cin-h-divider" aria-hidden="true"></div>

      <span class="cin-tagline">Gifts crafted with love, delivered with care ✦</span>
      <span class="cin-location">Est. Kadapa &nbsp;·&nbsp; Andhra Pradesh</span>
    </div>

  </div><!-- /.cin-stage -->

  <!-- Progress bar -->
  <div class="cin-progress" aria-hidden="true">
    <div class="cin-progress-bar"></div>
  </div>

</div><!-- /#cin-loader -->

<script>
(function(){
  /* ── Spawn gold sparkle particles ── */
  var pc = document.getElementById('cinParticles');
  if(pc){
    for(var i=0;i<38;i++){
      var s = document.createElement('div');
      s.className = 'cin-spark';
      var size = 2 + Math.random() * 4;
      s.style.cssText = [
        'left:'    + (6  + Math.random()*88) + '%',
        'top:'     + (12 + Math.random()*72) + '%',
        '--dur:'   + (1.9 + Math.random()*3.1) + 's',
        '--delay:' + (Math.random()*3.2) + 's',
        'width:'   + size + 'px',
        'height:'  + size + 'px'
      ].join(';');
      pc.appendChild(s);
    }
  }

  /* ── Dismiss loader ── */
  var loader = document.getElementById('cin-loader');
  var isMobile = window.matchMedia('(max-width:600px)').matches;
  var dismissDelay = isMobile ? 5500 : 8200;

  function dismiss(){
    if(!loader || loader.classList.contains('cin-done')) return;
    loader.classList.add('cin-done');
    setTimeout(function(){
      if(loader && loader.parentNode) loader.parentNode.removeChild(loader);
    }, 1200);
  }

  setTimeout(dismiss, dismissDelay);
})();
</script>
</body>
</html>
